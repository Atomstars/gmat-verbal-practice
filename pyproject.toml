[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line length -- black handles it
    "E701",   # multiple statements on one line (colon) -- common in dense parsing code
    "E702",   # multiple statements on one line (semicolon) -- common in dense parsing code
    "E741",   # ambiguous variable names (l, O, I) -- used throughout for option labels
    "F841",   # local variable assigned but never used -- will be cleaned up in B3
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
